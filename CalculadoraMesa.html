<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mesa | UAP/Divgp - Ebserh HULW</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Specific styles for calculator */
        .calculator-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .calculator-panel {
            background: var(--gray-800);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
        }

        #display {
            width: 100%;
            height: 60px;
            background: #95a5a6;
            border: none;
            margin-bottom: 1rem;
            text-align: right;
            padding: 1rem;
            font-size: 1.6rem;
            color: var(--gray-900);
            box-sizing: border-box;
            border-radius: var(--radius-md);
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .calc-btn {
            padding: 1rem;
            font-size: 1.1rem;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            background: var(--gray-200);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all var(--transition-fast);
        }

        .calc-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .calc-btn:active {
            transform: scale(0.98);
        }

        .calc-btn.op {
            background: #bdc3c7;
        }

        .calc-btn.memory {
            background: #9b59b6;
            color: white;
        }

        .calc-btn.equal {
            background: var(--ebserh-accent);
            color: white;
            grid-column: span 2;
        }

        .calc-btn.clear {
            background: var(--error);
            color: white;
        }

        .tape-panel {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        .tape-header {
            text-align: center;
            font-weight: bold;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--gray-300);
        }

        #tape-content {
            max-height: 450px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: var(--gray-800);
        }

        .tape-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed var(--gray-200);
        }

        .total-line {
            border-top: 2px solid var(--gray-900);
            border-bottom: 4px double var(--gray-900);
            font-weight: bold;
            margin-top: 1rem;
            padding: 0.75rem 0;
            color: var(--gray-900);
        }

        @media (max-width: 968px) {
            .calculator-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation Container -->
    <div id="navbar-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Page Header -->
            <header class="page-header">
                <h1 class="page-title">Calculadora Somadora de Mesa</h1>
                <p class="page-subtitle">Calculadora completa com fita de registro e exportação para PDF</p>
            </header>

            <div class="calculator-container">
                <!-- Calculator Panel -->
                <div class="calculator-panel">
                    <input type="text" id="display" value="R$ 0,00" disabled>
                    <div class="calc-buttons">
                        <button class="calc-btn memory" onclick="memClear()">MC</button>
                        <button class="calc-btn memory" onclick="memRecall()">MR</button>
                        <button class="calc-btn memory" onclick="memAdd()">M+</button>
                        <button class="calc-btn clear" onclick="clearAll()">AC</button>

                        <button class="calc-btn" onclick="appendNumber('7')">7</button>
                        <button class="calc-btn" onclick="appendNumber('8')">8</button>
                        <button class="calc-btn" onclick="appendNumber('9')">9</button>
                        <button class="calc-btn op" onclick="handleOp('/')">÷</button>

                        <button class="calc-btn" onclick="appendNumber('4')">4</button>
                        <button class="calc-btn" onclick="appendNumber('5')">5</button>
                        <button class="calc-btn" onclick="appendNumber('6')">6</button>
                        <button class="calc-btn op" onclick="handleOp('*')">×</button>

                        <button class="calc-btn" onclick="appendNumber('1')">1</button>
                        <button class="calc-btn" onclick="appendNumber('2')">2</button>
                        <button class="calc-btn" onclick="appendNumber('3')">3</button>
                        <button class="calc-btn op" onclick="handleOp('-')">-</button>

                        <button class="calc-btn" onclick="appendNumber('0')">0</button>
                        <button class="calc-btn" onclick="appendNumber('.')">.</button>
                        <button class="calc-btn op" onclick="handleOp('+')">+</button>
                        <button class="calc-btn op" onclick="clearEntry()">CE</button>

                        <button class="calc-btn equal" onclick="finalizeTotal()">TOTAL (Enter)</button>
                    </div>
                </div>

                <!-- Tape Panel -->
                <div class="tape-panel" id="printable-tape">
                    <div class="tape-header">
                        FITA DE REGISTRO<br>
                        <small id="date-now" style="font-size: 0.85rem; opacity: 0.7;"></small>
                    </div>
                    <div id="tape-content"></div>
                    <button class="btn btn-success btn-block" onclick="savePDF()" style="margin-top: 1.5rem;">
                        Salvar em PDF
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Main JavaScript -->
    <script src="js/main.js"></script>

    <script>
        let currentInput = '0';
        let runningTotal = 0;
        let lastOp = '+';
        let isNewInput = true;
        let memory = 0;

        const display = document.getElementById('display');
        const tapeContent = document.getElementById('tape-content');
        document.getElementById('date-now').innerText = new Date().toLocaleString('pt-BR');

        function formatCurrency(value) {
            return parseFloat(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function updateDisplay(val) {
            const num = parseFloat(val.replace(',', '.'));
            display.value = isNaN(num) ? "R$ 0,00" : formatCurrency(num);
        }

        function appendNumber(num) {
            if (isNewInput) {
                currentInput = num;
                isNewInput = false;
            } else {
                if (num === '.' && currentInput.includes('.')) return;
                currentInput += num;
            }
            display.value = "R$ " + currentInput.replace('.', ',');
        }

        function handleOp(op) {
            const val = parseFloat(currentInput);

            if (lastOp === '+') runningTotal += val;
            else if (lastOp === '-') runningTotal -= val;
            else if (lastOp === '*') runningTotal *= val;
            else if (lastOp === '/') runningTotal /= val;

            addToTape(val, lastOp);

            lastOp = op;
            currentInput = '0';
            isNewInput = true;
            updateDisplay('0');
        }

        function finalizeTotal() {
            const val = parseFloat(currentInput);
            if (lastOp === '+') runningTotal += val;
            else if (lastOp === '-') runningTotal -= val;
            else if (lastOp === '*') runningTotal *= val;
            else if (lastOp === '/') runningTotal /= val;

            addToTape(val, lastOp);
            addToTape(runningTotal, 'TOTAL');

            currentInput = runningTotal.toString();
            updateDisplay(currentInput);

            runningTotal = 0;
            lastOp = '+';
            isNewInput = true;
        }

        function addToTape(val, symbol) {
            const div = document.createElement('div');
            div.className = symbol === 'TOTAL' ? 'tape-line total-line' : 'tape-line';
            const label = symbol === 'TOTAL' ? 'TOTAL' : symbol;
            div.innerHTML = `<span>${label}</span> <span>${formatCurrency(val)}</span>`;
            tapeContent.appendChild(div);
            tapeContent.scrollTop = tapeContent.scrollHeight;
        }

        function clearAll() {
            currentInput = '0';
            runningTotal = 0;
            lastOp = '+';
            isNewInput = true;
            tapeContent.innerHTML = '';
            updateDisplay('0');
        }

        function clearEntry() {
            currentInput = '0';
            isNewInput = true;
            updateDisplay('0');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (/[0-9]/.test(e.key)) appendNumber(e.key);
            else if (e.key === '+') handleOp('+');
            else if (e.key === '-') handleOp('-');
            else if (e.key === '*') handleOp('*');
            else if (e.key === '/') { e.preventDefault(); handleOp('/'); }
            else if (e.key === '.' || e.key === ',') appendNumber('.');
            else if (e.key === 'Enter') { e.preventDefault(); finalizeTotal(); }
            else if (e.key === 'Escape') clearAll();
            else if (e.key === 'Backspace') {
                currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
                display.value = "R$ " + currentInput.replace('.', ',');
            }
        });

        function memAdd() { memory += parseFloat(currentInput); addToTape(currentInput, 'M+'); }
        function memRecall() { currentInput = memory.toString(); updateDisplay(currentInput); }
        function memClear() { memory = 0; addToTape('0', 'MC'); }

        function savePDF() {
            const element = document.getElementById('printable-tape');
            const btn = element.querySelector('.btn');
            btn.style.display = 'none';

            const opt = {
                margin: 10,
                filename: 'fita-calculo.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.style.display = 'block';
            });
        }
    </script>
</body>

</html>
