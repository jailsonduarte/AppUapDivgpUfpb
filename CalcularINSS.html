<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora INSS + Exportar | UAP/Divgp - Ebserh HULW</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <!-- Navigation Container -->
    <div id="navbar-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Page Header -->
            <header class="page-header">
                <h1 class="page-title">Calculadora INSS + Exportar</h1>
                <p class="page-subtitle">Cálculo do INSS com exportação para PDF e XLSX</p>
            </header>

            <!-- Salário Base -->
            <div class="card">
                <h2 class="card-header">Cálculo do Salário Base (Somar / Subtrair Valores)</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Valor</label>
                        <input type="number" id="entradaValor" class="form-input" placeholder="Digite o valor"
                            step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Operação</label>
                        <select id="tipoOperacao" class="form-select">
                            <option value="+">Somar (+)</option>
                            <option value="-">Subtrair (-)</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-secondary btn-block" onclick="adicionarValor()">+ Adicionar ao Cálculo</button>

                <div id="listaValores" class="result-box mt-3" style="display:none;"></div>

                <div class="result-box mt-3">
                    <div class="result-title">Salário Base Calculado</div>
                    <div class="result-value">R$ <span id="salarioBase">0,00</span></div>
                </div>

                <button class="btn btn-danger btn-block mt-3" onclick="limparTudo()">🧹 Limpar Tudo</button>
            </div>

            <!-- Calcular INSS -->
            <div class="card mt-4">
                <h2 class="card-header">Calculadora do INSS</h2>
                <button class="btn btn-primary btn-block btn-lg" onclick="calcularINSS()">Calcular INSS sobre o Salário
                    Base</button>

                <div id="resultado" class="result-section" style="display:none;">
                    <div class="result-box mt-4">
                        <div class="result-title">Resultado</div>
                        <div id="resultadoTexto"></div>
                    </div>

                    <div style="display:flex; gap:1rem; margin-top:1rem;">
                        <button class="btn btn-success" style="flex:1" onclick="salvarExcel()">📊 Salvar XLSX</button>
                        <button class="btn btn-danger" style="flex:1" onclick="salvarPDF()">📄 Salvar PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Main JavaScript -->
    <script src="js/main.js"></script>

    <script>
        function formatar(v) {
            return v.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        let valoresLancados = [];
        let salarioBase = 0;
        let contribuicao = 0;

        function adicionarValor() {
            let v = parseFloat(document.getElementById("entradaValor").value);
            const op = document.getElementById("tipoOperacao").value;

            if (!v || v <= 0) {
                alert("Digite um valor válido!");
                return;
            }

            if (op === "+") salarioBase += v;
            else salarioBase -= v;

            valoresLancados.push(op + " R$ " + formatar(v));

            const listaEl = document.getElementById("listaValores");
            listaEl.style.display = "block";
            listaEl.innerHTML = "<strong>Valores usados:</strong><br>" + valoresLancados.join("<br>");

            document.getElementById("salarioBase").innerHTML = formatar(salarioBase);
            document.getElementById("entradaValor").value = "";
        }

        function limparTudo() {
            valoresLancados = [];
            salarioBase = 0;
            contribuicao = 0;
            document.getElementById("entradaValor").value = "";
            document.getElementById("listaValores").style.display = "none";
            document.getElementById("listaValores").innerHTML = "";
            document.getElementById("salarioBase").innerHTML = "0,00";
            document.getElementById("resultado").style.display = "none";
            alert("Todos os dados foram zerados.");
        }

        const faixas = [
            { limite: 1518.00, aliquota: 0.075 },
            { limite: 2793.88, aliquota: 0.09 },
            { limite: 4190.83, aliquota: 0.12 },
            { limite: 8157.41, aliquota: 0.14 }
        ];

        function calcularINSS() {
            if (salarioBase <= 0) {
                alert("Primeiro monte o salário base!");
                return;
            }

            let restante = salarioBase;
            let anterior = 0;
            contribuicao = 0;

            for (let faixa of faixas) {
                if (restante <= 0) break;
                let baseFaixa = Math.min(restante, faixa.limite - anterior);
                contribuicao += baseFaixa * faixa.aliquota;
                restante -= baseFaixa;
                anterior = faixa.limite;
            }

            document.getElementById("resultadoTexto").innerHTML = `
            <strong>Contribuição ao INSS:</strong> R$ ${formatar(contribuicao)} / mês<br><br>
            <strong>Salário Base:</strong> R$ ${formatar(salarioBase)}<br><br>
            <strong>Tabela aplicada:</strong><br>
            Até R$ 1.518,00 — 7,5%<br>
            De R$ 1.518,01 até R$ 2.793,88 — 9%<br>
            De R$ 2.793,89 até R$ 4.190,83 — 12%<br>
            De R$ 4.190,84 até R$ 8.157,41 — 14%
        `;
            document.getElementById("resultado").style.display = "block";
        }

        function salvarExcel() {
            if (!contribuicao) { alert("Calcule o INSS antes!"); return; }

            const wsData = [
                ["Resultado INSS"],
                ["Salário Base", salarioBase],
                ["Contribuição INSS", contribuicao],
            ];

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, "INSS");
            XLSX.writeFile(wb, "resultado_INSS.xlsx");
        }

        function salvarPDF() {
            if (!contribuicao) { alert("Calcule o INSS antes!"); return; }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.text("Resultado INSS", 10, 10);
            doc.text("Salário Base: R$ " + formatar(salarioBase), 10, 20);
            doc.text("Contribuição INSS: R$ " + formatar(contribuicao), 10, 30);

            doc.save("resultado_INSS.pdf");
        }
    </script>
</body>

</html>
