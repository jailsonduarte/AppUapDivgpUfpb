<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IRPF 2026 | UAP/Divgp - Ebserh HULW</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
    <!-- Navigation Container -->
    <div id="navbar-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper" id="capture-area">
            <!-- Page Header -->
            <header class="page-header">
                <h1 class="page-title">Simulador IRPF 2026</h1>
                <p class="page-subtitle">Cálculo de Imposto de Renda Pessoa Física com memória detalhada</p>
            </header>

            <!-- Input Card -->
            <div class="card">
                <h2 class="card-header">Dados para Cálculo</h2>

                <div class="form-group">
                    <label class="form-label">Fontes de Renda</label>
                    <div id="income-list">
                        <div class="form-row">
                            <input type="text" class="form-input" placeholder="Origem (Ex: Salário)"
                                value="Rendimento Mensal">
                            <input type="number" class="form-input inc-val" value="9096.85" step="0.01">
                        </div>
                    </div>
                    <button class="btn btn-secondary btn-sm" onclick="addRow()" style="margin-top: 0.5rem;">
                        + Adicionar Fonte de Renda
                    </button>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Dedução INSS (Previdência)</label>
                        <input type="number" id="inss-deduct" class="form-input" value="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nº de Dependentes</label>
                        <input type="number" id="deps" class="form-input" value="0">
                    </div>
                </div>

                <button class="btn btn-primary btn-block btn-lg" onclick="executarCalculo()">
                    CALCULAR E GERAR MEMÓRIA
                </button>
            </div>

            <div id="step-by-step" class="accordion-container"></div>

            <div class="total-banner">
                <span class="total-label">IMPOSTO LÍQUIDO A PAGAR EM 2026</span>
                <span id="final-tax" class="total-value">R$ 0,00</span>
            </div>

            <button class="btn btn-danger btn-block" onclick="baixarPDF()" style="margin-top: 2rem;">
                SALVAR RELATÓRIO EM PDF
            </button>
        </div>
        </div>
    </main>

    <!-- Main JavaScript -->
    <script src="js/main.js"></script>

    <script>
        function addRow() {
            const div = document.createElement('div');
            div.className = 'form-row';
            div.innerHTML = '<input type="text" class="form-input" placeholder="Origem"> <input type="number" class="form-input inc-val" value="0" step="0.01">';
            document.getElementById('income-list').appendChild(div);
        }

        function fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function toggleAccordion(header) {
            const content = header.nextElementSibling;
            const icon = header.querySelector('.accordion-icon');
            if (content.style.display === 'block') {
                content.style.display = 'none';
                icon.innerText = '▼';
            } else {
                content.style.display = 'block';
                icon.innerText = '▲';
            }
        }

        function executarCalculo() {
            let brutoTotal = 0;
            document.querySelectorAll('.inc-val').forEach(el => brutoTotal += parseFloat(el.value || 0));
            const nDeps = parseInt(document.getElementById('deps').value || 0);
            const inssPagam = parseFloat(document.getElementById('inss-deduct').value || 0);

            // Constantes Oficiais 2026 (Lei 15.270/2025)
            const DEDUCAO_SIMPLIFICADA = 607.20;
            const DEDUCAO_DEPENDENTE = 189.59;

            // 1. Base de Cálculo (Opção pelo mais benéfico: Simplificado vs Deduções Legais)
            const valDeducaoDeps = nDeps * DEDUCAO_DEPENDENTE;
            const totalDeducoesLegais = inssPagam + valDeducaoDeps;

            // Decisão sobre qual desconto aplicar
            const usarSimplificado = DEDUCAO_SIMPLIFICADA > totalDeducoesLegais;
            const deducaoUtilizada = usarSimplificado ? DEDUCAO_SIMPLIFICADA : totalDeducoesLegais;
            const baseCalculo = Math.max(0, brutoTotal - deducaoUtilizada);

            // 2. Imposto Progressivo (Tabela Tradicional 2025 mantida em 2026)
            let aliq = 0, parc = 0;
            if (baseCalculo <= 2428.80) { aliq = 0; parc = 0; }
            else if (baseCalculo <= 2826.65) { aliq = 0.075; parc = 182.16; }
            else if (baseCalculo <= 3751.05) { aliq = 0.15; parc = 394.16; }
            else if (baseCalculo <= 4664.68) { aliq = 0.225; parc = 675.49; }
            else { aliq = 0.275; parc = 908.73; }

            const impostoBruto = Math.max(0, (baseCalculo * aliq) - parc);

            // 3. Redutor Adicional (Novidade Legislativa 2026)
            let reducaoAdicional = 0;
            let logicaReducao = "";

            if (brutoTotal <= 5000) {
                reducaoAdicional = impostoBruto;
                logicaReducao = "Isenção Total: Renda igual ou inferior a R$ 5.000,00.";
            } else if (brutoTotal <= 7350) {
                reducaoAdicional = 978.62 - (0.133145 * brutoTotal);
                reducaoAdicional = Math.max(0, Math.min(impostoBruto, reducaoAdicional));
                logicaReducao = "Redução Gradual: Aplicada fórmula da Lei 15.270/2025 para transição entre R$ 5k e R$ 7,35k.";
            } else {
                reducaoAdicional = 0;
                logicaReducao = "Sem redutor: Para rendas acima de R$ 7.350,00, aplica-se a tabela progressiva plena.";
            }

            const impostoLiquido = Math.max(0, impostoBruto - reducaoAdicional);

            // Renderização da Memória (Accordion Style - DIEESE Inspired)
            const container = document.getElementById('step-by-step');
            container.innerHTML = `
            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <span>Etapa 1: Consolidação e Deduções</span>
                    <span class="accordion-icon">▲</span>
                </div>
                <div class="accordion-content" style="display: block;">
                    Rendimento Bruto Total: ${fmt(brutoTotal)}<br>
                    --- Comparativo de Deduções ---<br>
                    Legais (INSS ${fmt(inssPagam)} + Deps ${fmt(valDeducaoDeps)}): ${fmt(totalDeducoesLegais)}<br>
                    Desconto Simplificado 2026: ${fmt(DEDUCAO_SIMPLIFICADA)}<br>
                    <div class="res-highlight">Dedução Escolhida: ${fmt(deducaoUtilizada)} (${usarSimplificado ? 'Simplificada' : 'Deduções Legais'})</div>
                    <div class="res-highlight">Base de Cálculo Final = ${fmt(baseCalculo)}</div>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <span>Etapa 2: Tabela Progressiva Tradicional</span>
                    <span class="accordion-icon">▼</span>
                </div>
                <div class="accordion-content">
                    Alíquota: ${(aliq * 100).toFixed(1)}% | Parcela a Deduzir: ${fmt(parc)}<br>
                    Cálculo: (${fmt(baseCalculo)} x ${aliq}) - ${fmt(parc)}
                    <div class="res-highlight">Imposto Bruto Apurado = ${fmt(impostoBruto)}</div>
                </div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <span>Etapa 3: Redutor Adicional 2026 (Lei 15.270)</span>
                    <span class="accordion-icon">▼</span>
                </div>
                <div class="accordion-content">
                    <strong>Motivo:</strong> ${logicaReducao}<br>
                    ${brutoTotal > 5000 && brutoTotal <= 7350 ? `Fórmula: 978,62 - (0,133145 x ${fmt(brutoTotal)})<br>` : ''}
                    <div class="res-highlight">(-) Valor do Abatimento: ${fmt(reducaoAdicional)}</div>
                </div>
            </div>

            <div class="accordion-item" style="border-left-color: var(--success);">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <span>Resultado Final: Imposto Líquido</span>
                    <span class="accordion-icon">▲</span>
                </div>
                <div class="accordion-content" style="display: block;">
                    Imposto Bruto (${fmt(impostoBruto)}) - Abatimento Adicional (${fmt(reducaoAdicional)})
                    <div class="res-highlight" style="color: var(--success); font-size: 1.25rem;">Líquido a Pagar = ${fmt(impostoLiquido)}</div>
                </div>
            </div>
        `;

            document.getElementById('final-tax').innerText = fmt(impostoLiquido);
            document.getElementById('result-area').style.display = 'block';
        }

        function baixarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const area = document.getElementById('capture-area');

            html2canvas(area, { scale: 2 }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 190;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                doc.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
                doc.save("Memoria_Calculo_IRPF_2026.pdf");
            });
        }
    </script>
</body>

</html>
