<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Terço de Férias | UAP/Divgp - Ebserh HULW</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>

<body>
    <!-- Navigation Container -->
    <div id="navbar-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Page Header -->
            <header class="page-header">
                <h1 class="page-title">Calculadora do Terço de Férias</h1>
                <p class="page-subtitle">Cálculo do terço de férias com INSS progressivo e exportação XLSX/PDF</p>
            </header>

            <!-- Entrada de Dados -->
            <div class="card">
                <h2 class="card-header">Dados para o Cálculo</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Salário Bruto (R$)</label>
                        <input type="number" id="salarioBruto" class="form-input" placeholder="0,00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Média Variáveis (Horas Extras/Comissões)</label>
                        <input type="number" id="mediaVariaveis" class="form-input" placeholder="0,00" step="0.01">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Dias de Férias</label>
                        <input type="number" id="diasFerias" class="form-input" value="30" min="1" max="30">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Dependentes</label>
                        <select id="numDependentes" class="form-select">
                            <option value="0">Nenhum</option>
                            <option value="1">1 dependente</option>
                            <option value="2">2 dependentes</option>
                            <option value="3">3 dependentes</option>
                            <option value="4">4 dependentes</option>
                            <option value="5">5 ou mais</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="abonoPecuniario" style="width: 1.2rem; height: 1.2rem;">
                        Vender 1/3 das férias (Abono Pecuniário)
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="adiantar13" style="width: 1.2rem; height: 1.2rem;">
                        Adiantar 1ª parcela do 13º salário
                    </label>
                </div>

                <button class="btn btn-primary btn-block btn-lg" onclick="calcularFeriasCompleto()">Calcular
                    Férias</button>
                <button class="btn btn-secondary btn-block mt-3" onclick="limparTudo()">🧹 Limpar Tudo</button>
            </div>

            <!-- Resultados -->
            <div id="resultado" class="card mt-4" style="display:none;">
                <h2 class="card-header">Resultado do Cálculo</h2>

                <div id="tabelaResultados" style="margin-bottom: 2rem; overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.95rem;">
                        <thead>
                            <tr
                                style="background: var(--gray-100); text-align: left; border-bottom: 2px solid var(--gray-200);">
                                <th style="padding: 1rem;">Eventos</th>
                                <th style="padding: 1rem; text-align: right;">Proventos</th>
                                <th style="padding: 1rem; text-align: right;">Descontos</th>
                            </tr>
                        </thead>
                        <tbody id="resultadoCorpo">
                            <!-- Inserido via JS -->
                        </tbody>
                        <tfoot>
                            <tr style="font-weight: 700; border-top: 2px solid var(--gray-200);">
                                <td style="padding: 1rem;">TOTAIS</td>
                                <td style="padding: 1rem; text-align: right; color: var(--success);"
                                    id="totalProventos">R$ 0,00</td>
                                <td style="padding: 1rem; text-align: right; color: var(--error);" id="totalDescontos">
                                    R$ 0,00</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <div class="total-banner">
                    <span class="total-label">Valor líquido a receber</span>
                    <strong class="total-value" id="valLiquido">R$ 0,00</strong>
                </div>

                <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                    <button class="btn btn-success" style="flex:1" onclick="salvarExcel()">📊 Salvar XLSX</button>
                    <button class="btn btn-danger" style="flex:1" onclick="salvarPDF()">📄 Salvar PDF</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Main JavaScript -->
    <script src="js/main.js"></script>

    <script>
        function formatar(v) {
            return v.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        let calculoAtual = {
            proventos: [],
            descontos: [],
            totalProventos: 0,
            totalDescontos: 0,
            liquido: 0
        };

        function limparTudo() {
            document.getElementById("salarioBruto").value = "";
            document.getElementById("mediaVariaveis").value = "";
            document.getElementById("diasFerias").value = "30";
            document.getElementById("numDependentes").value = "0";
            document.getElementById("abonoPecuniario").checked = false;
            document.getElementById("adiantar13").checked = false;
            document.getElementById("resultado").style.display = "none";
            calculoAtual = { proventos: [], descontos: [], totalProventos: 0, totalDescontos: 0, liquido: 0 };
        }

        function calcularFeriasCompleto() {
            const salarioBruto = parseFloat(document.getElementById("salarioBruto").value) || 0;
            const mediaVariaveis = parseFloat(document.getElementById("mediaVariaveis").value) || 0;
            const diasFerias = parseInt(document.getElementById("diasFerias").value) || 0;
            const numDependentes = parseInt(document.getElementById("numDependentes").value) || 0;
            const temAbono = document.getElementById("abonoPecuniario").checked;
            const tem13 = document.getElementById("adiantar13").checked;

            if (salarioBruto <= 0) {
                alert("Por favor, digite o salário bruto.");
                return;
            }

            const baseMensal = salarioBruto + mediaVariaveis;

            // 1. Proventos
            const valorFerias = (baseMensal / 30) * diasFerias;
            const umTercoFerias = valorFerias / 3;

            let proventos = [
                { nome: `Férias (${diasFerias} dias)`, valor: valorFerias },
                { nome: "1/3 Férias", valor: umTercoFerias }
            ];

            let baseInss = valorFerias + umTercoFerias;
            let baseIrrf = baseInss;

            if (temAbono) {
                const diasAbono = 10; // No Brasil a venda é sempre de 1/3 (10 dias se férias for 30)
                const valorAbono = (baseMensal / 30) * diasAbono;
                const umTercoAbono = valorAbono / 3;
                proventos.push({ nome: `Abono Pecuniário (${diasAbono} dias)`, valor: valorAbono });
                proventos.push({ nome: "1/3 Abono Pecuniário", valor: umTercoAbono });
                // Abono não incide INSS nem IRRF
            }

            if (tem13) {
                const valor13 = salarioBruto / 2;
                proventos.push({ nome: "Adiantamento 1ª Parcela 13º", valor: valor13 });
                // 1ª parcela de 13º não tem descontos de INSS/IRRF (descontados na 2ª)
            }

            // 2. Descontos
            // INSS 2024/2025
            const inss = calcularINSS(baseInss);
            let descontos = [
                { nome: "INSS", valor: inss }
            ];

            // IRRF 2024/2025
            const deducaoDependentes = numDependentes * 189.59;
            const irrf = calcularIRRF(baseInss - inss - deducaoDependentes);
            if (irrf > 0) {
                descontos.push({ nome: "IRRF", valor: irrf });
            }

            // TOTAIS
            const totalProventos = proventos.reduce((acc, p) => acc + p.valor, 0);
            const totalDescontos = descontos.reduce((acc, d) => acc + d.valor, 0);
            const liquido = totalProventos - totalDescontos;

            calculoAtual = { proventos, descontos, totalProventos, totalDescontos, liquido };
            renderizarResultados();
        }

        function calcularINSS(base) {
            const faixas = [
                { limite: 1518.00, aliquota: 0.075 },
                { limite: 2793.88, aliquota: 0.09 },
                { limite: 4190.83, aliquota: 0.12 },
                { limite: 8157.41, aliquota: 0.14 }
            ];

            let imposto = 0;
            let baseRestante = base;
            let faixaAnterior = 0;

            for (let i = 0; i < faixas.length; i++) {
                const faixa = faixas[i];
                const baseNaFaixa = Math.min(baseRestante, faixa.limite - faixaAnterior);
                if (baseNaFaixa > 0) {
                    imposto += baseNaFaixa * faixa.aliquota;
                    baseRestante -= baseNaFaixa;
                }
                faixaAnterior = faixa.limite;
                if (baseRestante <= 0) break;
            }

            // Teto do INSS
            const tetoInss = 951.62; // Valor aproximado para 2025
            return Math.min(imposto, tetoInss);
        }

        function calcularIRRF(base) {
            if (base <= 2259.20) return 0;

            const faixas = [
                { limite: 2826.65, aliquota: 0.075, deducao: 169.44 },
                { limite: 3751.05, aliquota: 0.15, deducao: 381.44 },
                { limite: 4664.68, aliquota: 0.225, deducao: 662.77 },
                { limite: Infinity, aliquota: 0.275, deducao: 896.00 }
            ];

            for (let faixa of faixas) {
                if (base <= faixa.limite) {
                    return (base * faixa.aliquota) - faixa.deducao;
                }
            }
            return 0;
        }

        function renderizarResultados() {
            const corpo = document.getElementById("resultadoCorpo");
            corpo.innerHTML = "";

            const maxLinhas = Math.max(calculoAtual.proventos.length, calculoAtual.descontos.length);

            for (let i = 0; i < maxLinhas; i++) {
                const p = calculoAtual.proventos[i] || { nome: "-", valor: 0 };
                const d = calculoAtual.descontos[i] || { nome: "-", valor: 0 };

                const tr = document.createElement("tr");
                tr.style.borderBottom = "1px solid var(--gray-100)";
                tr.innerHTML = `
                    <td style="padding: 0.75rem 1rem;">
                        <div style="font-weight: 500;">${p.nome !== "-" ? p.nome : d.nome}</div>
                    </td>
                    <td style="padding: 0.75rem 1rem; text-align: right; color: var(--gray-700);">
                        ${p.valor > 0 ? "R$ " + formatar(p.valor) : "-"}
                    </td>
                    <td style="padding: 0.75rem 1rem; text-align: right; color: var(--error);">
                        ${d.valor > 0 ? "R$ " + formatar(d.valor) : "-"}
                    </td>
                `;
                corpo.appendChild(tr);
            }

            document.getElementById("totalProventos").innerText = "R$ " + formatar(calculoAtual.totalProventos);
            document.getElementById("totalDescontos").innerText = "R$ " + formatar(calculoAtual.totalDescontos);
            document.getElementById("valLiquido").innerText = "R$ " + formatar(calculoAtual.liquido);
            document.getElementById("resultado").style.display = "block";
        }

        function salvarExcel() {
            if (calculoAtual.liquido <= 0) { alert("Calcule as férias primeiro!"); return; }

            const wsData = [
                ["Calculadora de Férias - Ebserh HULW"],
                [""],
                ["Evento", "Proventos", "Descontos"]
            ];

            calculoAtual.proventos.forEach(p => wsData.push([p.nome, p.valor, 0]));
            calculoAtual.descontos.forEach(d => wsData.push([d.nome, 0, d.valor]));

            wsData.push([""]);
            wsData.push(["TOTAL PROVENTOS", calculoAtual.totalProventos, ""]);
            wsData.push(["TOTAL DESCONTOS", "", calculoAtual.totalDescontos]);
            wsData.push(["VALOR LÍQUIDO", "", calculoAtual.liquido]);

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, "CalculoFerias");
            XLSX.writeFile(wb, "calculo_ferias.xlsx");
        }

        function salvarPDF() {
            if (calculoAtual.liquido <= 0) { alert("Calcule as férias primeiro!"); return; }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.text("Ebserh - Hospital Universitário Lauro Wanderley", 10, 15);
            doc.setFontSize(14);
            doc.text("Memória de Cálculo - Férias", 10, 22);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.text(`Data: ${new Date().toLocaleDateString('pt-BR')} ${new Date().toLocaleTimeString('pt-BR')}`, 10, 28);

            let tableData = [];
            calculoAtual.proventos.forEach(p => tableData.push([p.nome, "R$ " + formatar(p.valor), "-"]));
            calculoAtual.descontos.forEach(d => tableData.push([d.nome, "-", "R$ " + formatar(d.valor)]));

            doc.autoTable({
                startY: 35,
                head: [['Evento', 'Proventos', 'Descontos']],
                body: tableData,
                theme: 'grid',
                headStyles: { fillColor: [0, 82, 155] },
                foot: [['TOTAIS', "R$ " + formatar(calculoAtual.totalProventos), "R$ " + formatar(calculoAtual.totalDescontos)]],
                footStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold' }
            });

            let finalY = doc.lastAutoTable.finalY + 15;
            doc.setDrawColor(0, 82, 155);
            doc.setLineWidth(1);
            doc.rect(10, finalY - 10, 190, 15);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text(`VALOR LÍQUIDO A RECEBER: R$ ${formatar(calculoAtual.liquido)}`, 15, finalY);

            doc.save("calculo_ferias.pdf");
        }
    </script>
</body>

</html>
